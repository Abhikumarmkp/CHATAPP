<!DOCTYPE html>
<html>
<head>
    <title>Private Chat App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            flex-direction: column;
        }

        h2 {
            text-align: center;
            color: white;
            padding: 15px;
        }

        .top-bar {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 10px;
        }

        .top-bar input {
            padding: 10px;
            border-radius: 8px;
            border: none;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            background: #6c63ff;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #4e4ad1;
        }

        .app {
            display: flex;
            flex: 1;
            gap: 10px;
            padding: 10px;
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px;
            color: white;
            overflow-y: auto;
        }

        .sidebar h3 {
            margin-bottom: 10px;
        }

        .sidebar ul {
            list-style: none;
        }

        .sidebar li {
            padding: 10px;
            margin-bottom: 5px;
            border-radius: 8px;
            background: rgba(255,255,255,0.2);
            cursor: pointer;
        }

        .sidebar li:hover {
            background: rgba(255,255,255,0.35);
        }

        .active-user {
            background: #6c63ff !important;
        }

        /* Chat area */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            overflow: hidden;
        }

        #chat {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
        }

        .message {
            max-width: 70%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 15px;
            animation: fadeIn 0.3s ease;
        }

        .sent {
            background: #6c63ff;
            color: white;
            margin-left: auto;
        }

        .received {
            background: white;
            color: black;
        }

        .msg-header {
            font-size: 11px;
            opacity: 0.7;
            margin-bottom: 3px;
        }

        .msg-body {
            font-size: 14px;
        }

        .avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #6c63ff;
            color: white;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-right: 6px;
            font-size: 12px;
        }

        #typing {
            font-size: 12px;
            padding: 5px 15px;
            color: white;
        }

        .input-area {
            display: flex;
            gap: 10px;
            padding: 10px;
            background: rgba(255,255,255,0.2);
        }

        .input-area input {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: none;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(5px);}
            to {opacity: 1; transform: translateY(0);}
        }

        @media(max-width: 768px) {
            .app {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
            }
        }
    </style>
</head>

<body>

<h2>CHIT-CHAT!!!</h2>

<div class="top-bar">
    <input id="username" placeholder="Enter username">
    <button onclick="registerUser()">Join</button>
</div>

<div class="app">

    <div class="sidebar">
        <h3>🟢 Online Users</h3>
        <ul id="users"></ul>
    </div>

    <div class="chat-container">
        <div id="chat"></div>
        <div id="typing"></div>

        <div class="input-area">
            <input id="toUser" placeholder="Send to...">
            <input id="message" placeholder="Type message...">
            <button onclick="sendMessage()">➤</button>
        </div>
    </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let currentUser = "";
let selectedUser = "";

const chatBox = document.getElementById('chat');
const usersList = document.getElementById('users');
const typingDiv = document.getElementById('typing');

function avatar(name) {
    return name.charAt(0).toUpperCase();
}

function timeNow() {
    return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

function registerUser() {
    const username = document.getElementById('username').value.trim();
    if (username) {
        currentUser = username;
        socket.emit('register', username);
    }
}

function sendMessage() {
    const messageInput = document.getElementById('message');
    const message = messageInput.value.trim();

    if (selectedUser && message) {
        socket.emit('privateMessage', {
            to: selectedUser,
            message
        });

        addMessage("You", message, true);
        messageInput.value = "";
    }
}

function addMessage(sender, message, isSelf) {
    const div = document.createElement('div');
    div.className = `message ${isSelf ? 'sent' : 'received'}`;

    div.innerHTML = `
        <div class="msg-header">
            <span class="avatar">${avatar(sender)}</span>
            ${sender} • ${timeNow()}
        </div>
        <div class="msg-body">${message}</div>
    `;

    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}

/* Receive message */
socket.on('privateMessage', ({ from, message }) => {
    addMessage(from, message, false);
});

/* Typing */
document.getElementById('message').addEventListener('input', () => {
    socket.emit('typing', selectedUser);

    clearTimeout(window.typingTimeout);
    window.typingTimeout = setTimeout(() => {
        socket.emit('stopTyping', selectedUser);
    }, 1000);
});

socket.on('typing', (user) => {
    typingDiv.innerText = `${user} is typing...`;
});

socket.on('stopTyping', () => {
    typingDiv.innerText = "";
});

/* Enter to send */
document.getElementById('message').addEventListener('keypress', e => {
    if (e.key === "Enter") sendMessage();
});

/* Users list */
socket.on('userList', users => {
    usersList.innerHTML = "";

    users.forEach(user => {
        const li = document.createElement('li');
        li.innerText = user;

        li.onclick = () => {
            selectedUser = user;
            document.getElementById('toUser').value = user;

            document.querySelectorAll('#users li').forEach(el => el.classList.remove('active-user'));
            li.classList.add('active-user');
        };

        usersList.appendChild(li);
    });
});
</script>

</body>
</html>
